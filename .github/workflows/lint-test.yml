name: lint/test/typecheck

on:
  - push

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true


jobs:
  install:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ./.github/actions/setup-pnpm

  lint:
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: lint
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/checkout@v4
      - name: test
        run: pnpm test
  
  typecheck:
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/checkout@v4
      - name: typecheck
        run: pnpm typecheck